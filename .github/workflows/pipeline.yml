name: 'The Pipeline'

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
    types: [opened, reopened, synchronize]
  workflow_dispatch:

permissions:
  contents: read

# PR code updates cancel obsolete runs; push/manual runs are serialized but
# never cancelled — cancelling a parent also cancels the reusable deploy it
# called, even though deploy-app.yml itself sets cancel-in-progress: false.
concurrency:
  group: pipeline-${{ github.event_name }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  lint-branch:
    name: 'Lint branch'
    if: github.event_name == 'pull_request'
    uses: ./.github/workflows/lint-branch.yml

  ci-node:
    name: 'CI (Node)'
    needs: [lint-branch]
    if: |
      always() &&
      (needs.lint-branch.result == 'success' || needs.lint-branch.result == 'skipped')
    permissions:
      contents: read
      checks: write
    uses: ./.github/workflows/ci-node.yml
    secrets: inherit

  doctor:
    name: 'Doctor'
    needs: [lint-branch]
    if: |
      always() &&
      (needs.lint-branch.result == 'success' || needs.lint-branch.result == 'skipped')
    permissions:
      contents: read
    uses: ./.github/workflows/doctor.yml
    secrets: inherit

  deploy:
    name: 'Deploy'
    needs: [ci-node, doctor]
    if: |
      github.event_name == 'push' &&
      github.ref == 'refs/heads/main' &&
      needs.ci-node.result == 'success' &&
      needs.doctor.result == 'success'
    permissions:
      contents: read
    uses: ./.github/workflows/deploy-app.yml
    secrets: inherit
