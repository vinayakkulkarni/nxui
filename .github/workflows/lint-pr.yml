name: Lint PR

on:
  pull_request:
    branches: [main]
    types: [opened, reopened, synchronize, edited]

permissions:
  pull-requests: write

concurrency:
  group: lint-pr-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  validate-pr-title:
    name: Validate PR title
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - uses: amannn/action-semantic-pull-request@v6
        id: lint_pr_title
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          types: |
            feat
            fix
            docs
            style
            refactor
            perf
            test
            build
            ci
            chore
            revert
          subjectPattern: ^(?![A-Z]).+$
          subjectPatternError: |
            The subject "{subject}" found in the pull request title "{title}"
            doesn't match the configured pattern. Please ensure the subject
            starts with a lowercase letter, not uppercase.
          # Dependabot's github-actions ecosystem emits "Bump" (uppercase) in
          # the subject — see dependabot-core#2257. Skip validation for
          # automated dependency PRs; automerger.yml still gates them on the
          # update-type (semver-minor/patch only).
          ignoreLabels: |
            dependencies
            deps

      - uses: marocchino/sticky-pull-request-comment@v3
        if: always() && (steps.lint_pr_title.outputs.error_message != null)
        with:
          header: pr-title-lint-error
          message: |
            ### ❌ Invalid PR title

            PR titles must follow the [Conventional Commits](https://www.conventionalcommits.org/en/v1.0.0/) spec.

            **Error:**
            ```
            ${{ steps.lint_pr_title.outputs.error_message }}
            ```

            **Valid examples:**
            - `feat: add Shimmer Button component`
            - `fix: correct keyboard navigation in CmdMenu`
            - `chore: format and lint`
            - `feat(ui): add Button variant`
            - `refactor!: drop Node.js 18 support`

      - uses: marocchino/sticky-pull-request-comment@v3
        if: steps.lint_pr_title.outputs.error_message == null
        with:
          header: pr-title-lint-error
          delete: true
