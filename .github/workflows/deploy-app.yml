name: Deploy App

on:
  workflow_call:
    secrets:
      CLOUDFLARE_API_TOKEN:
        description: 'Cloudflare API token authorized to deploy the nxui Worker'
        required: true
      CLOUDFLARE_ACCOUNT_ID:
        description: 'Cloudflare account containing the nxui Worker'
        required: true
      NUXT_PUBLIC_OPENPANEL_CLIENT_ID:
        description: 'Public OpenPanel client ID baked into the production bundle'
        required: false
  workflow_dispatch:

# Production deployments are serialized and never cancelled mid-flight — a
# second run waits for the active `wrangler deploy` to finish rather than
# interrupting it and leaving the Worker in a half-applied state.
concurrency:
  group: deploy-production
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy to Cloudflare Workers
    runs-on: ubuntu-latest
    timeout-minutes: 20

    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Setup pnpm
        uses: pnpm/action-setup@v6

      - name: Setup Node.js
        uses: actions/setup-node@v7
        with:
          node-version-file: '.nvmrc'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build app
        run: |
          max_attempts=3
          for attempt in $(seq 1 "$max_attempts"); do
            echo "Build attempt $attempt/$max_attempts..."
            if pnpm run build; then
              echo "Build succeeded on attempt $attempt"
              exit 0
            fi
            if [ "$attempt" -lt "$max_attempts" ]; then
              echo "Build failed, retrying in 15s..."
              sleep 15
            fi
          done
          echo "Build failed after $max_attempts attempts"
          exit 1
        env:
          NITRO_PRESET: cloudflare_module
          NODE_OPTIONS: --max-old-space-size=8192
          NUXT_PUBLIC_OPENPANEL_CLIENT_ID: ${{ secrets.NUXT_PUBLIC_OPENPANEL_CLIENT_ID }}

      # NUXT_OPENPANEL_CLIENT_SECRET is managed as a Worker secret directly in
      # the Cloudflare dashboard and read at runtime; it is intentionally not
      # supplied here so deploys don't overwrite the dashboard-managed value.
      # Nitro writes the merged wrangler config to .output/server/wrangler.json
      # via cloudflare.deployConfig (see nuxt.config.ts).
      - name: Deploy to Cloudflare Workers
        run: pnpm exec wrangler deploy --config .output/server/wrangler.json
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
